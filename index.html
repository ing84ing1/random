<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สุ่มกิจกรรมอ่านหนังสือ</title>

<style>

body{
font-family: system-ui;
background:linear-gradient(135deg,#5f9cff,#7b5cff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
text-align:center;
}

.card{
width:320px;
height:180px;
background:white;
color:#333;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
transition:0.3s;
}

button{
margin-top:25px;
padding:14px 28px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff6b6b;
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h2>📚 สุ่มกิจกรรมอ่านหนังสือ</h2>

<div class="card" id="card">
กดสุ่มเพื่อเริ่ม
</div>

<button onclick="randomActivity()">สุ่มกิจกรรม</button>

</div>

<script>

let activities=[

"📖 อ่านหนังสือ 5 นาที",
"📖 อ่านหนังสือ 10 นาที",
"📖 อ่านสไลด์ 3 หน้า",
"📖 อ่านบทเรียน 1 หน้า",
"📖 ทบทวนโน้ตที่จดไว้",

"🧠 อ่านแล้วสรุป 3 บรรทัด",
"🧠 อ่านแล้วจดโน้ตเพิ่ม",
"🧠 อ่านแล้วตั้งคำถาม 1 ข้อ",

"😴 พัก 5 นาที",
"😴 พักสายตา 2 นาที",
"🛏 หลับตาพัก",

"🧘 ยืดเส้น 2 นาที",
"🚶 เดินรอบห้อง",
"🚶 ลุกไปเดิน 1 นาที",

"💧 ดื่มน้ำ",
"🍪 กินขนมเล็กน้อย",
"☕ ชงเครื่องดื่ม",

"🎵 ฟังเพลง 1 เพลง",
"🎧 เปิดเพลงแล้วพัก",

"📱 เล่นมือถือ 3 นาที",

"🌿 มองออกไปนอกหน้าต่าง",
"🌿 สูดอากาศลึก ๆ",

"📚 กลับไปอ่านต่อ",
"📚 อ่านอีก 2 หน้า",
"📚 อ่านต่ออีก 10 นาที",

"🔥 โฟกัสอ่านทันที",
"🔥 อ่านต่อ 15 นาที"

];

function randomActivity(){

let card=document.getElementById("card");

card.style.transform="scale(0.8)";

setTimeout(()=>{

let r=Math.floor(Math.random()*activities.length);

card.innerHTML=activities[r];

card.style.transform="scale(1)";

},200);

}

</script>

</body>
</html>
