<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biotech Global Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <style>
        :root { --primary: #4facfe; --secondary: #00f2fe; --accent: #ff6b6b; --dark: #2d3436; --success: #00eb84; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); margin: 0; min-height: 100vh; display: flex; justify-content: center; padding: 20px; color: white; }
        .container { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(12px); padding: 30px; border-radius: 24px; width: 100%; max-width: 600px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        input { width: calc(100% - 24px); padding: 12px; margin: 8px 0; border: none; border-radius: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 10px; background: var(--accent); color: white; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* Table Style */
        .exam-table { width: 100%; border-collapse: collapse; background: white; color: var(--dark); border-radius: 12px; overflow: hidden; margin-top: 15px; font-size: 14px; }
        .exam-table th { background: #f1f2f6; padding: 12px; text-align: left; }
        .exam-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .days-highlight { font-weight: bold; color: var(--accent); }
        
        .timer-display { font-size: 56px; font-weight: bold; text-align: center; margin: 15px 0; }
        #leaderboard, #calendar { background: white; color: var(--dark); border-radius: 15px; padding: 15px; margin-top: 15px; }
        .progress-bar { background: rgba(255,255,255,0.3); height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .bar-fill { height: 100%; width: 0%; background: var(--success); transition: 0.6s; }
        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 25px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-ui">
        <h2 style="text-align: center;">🔐 Biotech Study Dashboard</h2>
        <input id="email" type="email" placeholder="อีเมล">
        <input id="password" type="password" placeholder="รหัสผ่าน">
        <div style="text-align: center; margin-top: 10px;">
            <button onclick="authAction('login')">เข้าสู่ระบบ</button>
            <button onclick="authAction('reg')" style="background:transparent; border:1px solid white;">ลงทะเบียน</button>
        </div>
    </div>

    <div id="app-ui" style="display:none">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <small id="user-mail"></small>
            <button onclick="logout()" style="padding: 5px 10px; font-size: 11px;">Log out</button>
        </div>

        <div class="timer-display" id="clock">25:00</div>
        <div style="text-align:center;">
            <button onclick="timerStart()">Start</button>
            <button onclick="timerPause()">Pause</button>
            <button onclick="timerReset()" style="background:#636e72">Reset</button>
        </div>

        <hr>

        <h3>📅 ตารางวันสอบ (ทุกคน)</h3>
        <div style="display:flex; gap:5px; margin-bottom: 10px;">
            <input id="ex-name" placeholder="วิชา" style="flex:2;">
            <input id="ex-date" type="date" style="flex:2;">
            <button onclick="addExam()" style="flex:1; background:#fdcb6e;">เพิ่ม</button>
        </div>
        
        <table class="exam-table">
            <thead>
                <tr>
                    <th>โดย</th>
                    <th>วิชา</th>
                    <th>วันสอบ</th>
                    <th>เหลือ</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="exam-body">
                </tbody>
        </table>

        <hr>

        <h3>📖 Reading Progress</h3>
        <input id="bk-title" placeholder="กำลังอ่านอะไรอยู่...">
        <input id="bk-perc" type="number" placeholder="% ความคืบหน้า">
        <button onclick="saveProgress()" style="width:100%; margin-top:10px; background: var(--success);">Update</button>
        <div class="progress-bar"><div id="bk-bar" class="bar-fill"></div></div>

        <h3>🏆 Leaderboard</h3>
        <div id="leaderboard"></div>

        <h3>📅 Work Calendar</h3>
        <div id="calendar"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, query, where, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBdGbhUgZ2XcjF1FnXDQQD1LWYGMdyQnQc",
        authDomain: "mumi-chat-f752d.firebaseapp.com",
        projectId: "mumi-chat-f752d",
        storageBucket: "mumi-chat-f752d.firebasestorage.app",
        messagingSenderId: "753963622178",
        appId: "1:753963622178:web:172ee93da98c1a97bb0f7b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let timerInt, secondsLeft = 1500;

    // --- Auth ---
    window.authAction = async (t) => {
        const e = document.getElementById("email").value, p = document.getElementById("password").value;
        try { t==='login' ? await signInWithEmailAndPassword(auth, e, p) : await createUserWithEmailAndPassword(auth, e, p); } 
        catch (err) { alert(err.message); }
    };
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, u => {
        if(u) {
            document.getElementById("auth-ui").style.display="none";
            document.getElementById("app-ui").style.display="block";
            document.getElementById("user-mail").innerText = u.email;
            initApp();
        } else {
            document.getElementById("auth-ui").style.display="block";
            document.getElementById("app-ui").style.display="none";
        }
    });

    // --- Timer ---
    window.timerStart = () => {
        clearInterval(timerInt);
        timerInt = setInterval(() => {
            secondsLeft--;
            const m = Math.floor(secondsLeft/60), s = secondsLeft%60;
            document.getElementById("clock").innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(secondsLeft <= 0) { clearInterval(timerInt); alert("Time up!"); timerReset(); }
        }, 1000);
    };
    window.timerPause = () => clearInterval(timerInt);
    window.timerReset = () => { timerPause(); secondsLeft = 1500; document.getElementById("clock").innerText = "25:00"; };

    // --- Global Exam Countdown (Table) ---
    window.addExam = async () => {
        const t = document.getElementById("ex-name").value, d = document.getElementById("ex-date").value;
        if(t && d) {
            await addDoc(collection(db,"exams"), { 
                uid: auth.currentUser.uid, 
                user: auth.currentUser.email.split('@')[0], 
                title: t, 
                date: d 
            });
            document.getElementById("ex-name").value = "";
        }
    };
    window.removeExam = async (id) => { if(confirm("ลบรายการนี้ใช่ไหม?")) await deleteDoc(doc(db,"exams",id)); };

    // --- Progress ---
    window.saveProgress = async () => {
        const t = document.getElementById("bk-title").value, p = parseInt(document.getElementById("bk-perc").value);
        if(t && !isNaN(p)) await setDoc(doc(db,"progress",auth.currentUser.uid), { email: auth.currentUser.email, book: t, percent: p });
    };

    function initApp() {
        // Load Exams (Global)
        onSnapshot(query(collection(db,"exams"), orderBy("date", "asc")), s => {
            const body = document.getElementById("exam-body");
            body.innerHTML = "";
            s.forEach(d => {
                const data = d.data();
                const diff = Math.ceil((new Date(data.date) - new Date()) / 86400000);
                const daysText = diff > 0 ? `${diff} วัน` : (diff === 0 ? "วันนี้!" : "ผ่านแล้ว");
                body.innerHTML += `
                    <tr>
                        <td><small>${data.user}</small></td>
                        <td><b>${data.title}</b></td>
                        <td>${data.date}</td>
                        <td class="days-highlight">${daysText}</td>
                        <td>${data.uid === auth.currentUser.uid ? `<span onclick="removeExam('${d.id}')" style="cursor:pointer;">🗑️</span>` : ''}</td>
                    </tr>`;
            });
        });

        // Load Leaderboard
        onSnapshot(collection(db,"progress"), s => {
            let l = []; s.forEach(d => l.push(d.data()));
            l.sort((a,b)=>b.percent-a.percent);
            document.getElementById("leaderboard").innerHTML = l.map((p,i)=>`<div>${i+1}. ${p.email.split('@')[0]} - ${p.percent}%</div>`).join('');
        });

        // Load Personal Progress
        onSnapshot(doc(db,"progress",auth.currentUser.uid), s => {
            if(s.exists()){
                document.getElementById("bk-bar").style.width = s.data().percent+"%";
                document.getElementById("bk-title").value = s.data().book;
                document.getElementById("bk-perc").value = s.data().percent;
            }
        });

        // Calendar
        const cal = new FullCalendar.Calendar(document.getElementById('calendar'), { initialView: 'dayGridMonth', height: 'auto' });
        cal.render();
    }
</script>
</body>
</html>
