<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Study App</title>

<style>

body{
font-family:system-ui;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
width:360px;
text-align:center;
}

.card{
background:white;
color:#333;
padding:10px;
border-radius:10px;
margin:10px 0;
}

.timer{
font-size:40px;
font-weight:bold;
}

input{
width:90%;
padding:8px;
margin:5px 0;
border:none;
border-radius:6px;
}

button{
padding:8px 16px;
margin:4px;
border:none;
border-radius:8px;
background:#ff6b6b;
color:white;
cursor:pointer;
}

.progress{
background:#ddd;
height:20px;
border-radius:10px;
overflow:hidden;
}

.bar{
height:20px;
width:0%;
background:#4caf50;
}

#leaderboard{
background:white;
color:#333;
padding:10px;
border-radius:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="login">

<h2>🔐 Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button> <button onclick="register()">Register</button>

<p id="error"></p>

</div>

<!-- APP -->

<div id="app" style="display:none">

<h2>📚 Study App</h2>

<p id="user"></p>

<!-- TIMER -->

<div id="mode">พร้อมเริ่ม</div>

<div class="timer" id="timer">25:00</div>

<button onclick="start()">Start</button> <button onclick="pause()">Pause</button> <button onclick="resume()">Resume</button>

<div class="card" id="activity">
กดสุ่มกิจกรรม
</div>

<button onclick="randomActivity()">สุ่มกิจกรรม</button>

<div>
Pomodoro วันนี้: <span id="count">0</span>
</div>

<!-- TRACKER -->

<h3>📚 Reading Tracker</h3>

<input id="book" placeholder="กำลังอ่านเรื่องอะไร">

<input id="progressInput" type="number" min="0" max="100" placeholder="% ที่อ่าน">

<button onclick="updateProgress()">Update</button>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<p id="status"></p>

<!-- LEADERBOARD -->

<h3>🏆 Leaderboard</h3>

<div id="leaderboard">Loading...</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
updateDoc,
getDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBdGbhUgZ2XcjF1FnXDQQD1LWYGMdyQnQc",
authDomain: "mumi-chat-f752d.firebaseapp.com",
projectId: "mumi-chat-f752d",
storageBucket: "mumi-chat-f752d.firebasestorage.app",
messagingSenderId: "753963622178",
appId: "1:753963622178:web:172ee93da98c1a97bb0f7b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const errorText=document.getElementById("error");

/* LOGIN */

window.login=function(){

const email=emailInput.value
const password=passwordInput.value

signInWithEmailAndPassword(auth,email,password)

.catch(err=>{
errorText.innerText=err.message
})

}

/* REGISTER */

window.register=function(){

const email=emailInput.value
const password=passwordInput.value

createUserWithEmailAndPassword(auth,email,password)

.catch(err=>{
errorText.innerText=err.message
})

}

/* LOGOUT */

window.logout=function(){

signOut(auth)

}

/* AUTH STATE */

onAuthStateChanged(auth,(user)=>{

if(user){

login.style.display="none"
app.style.display="block"

userText.innerHTML="👤 "+user.email

loadLeaderboard()

}else{

login.style.display="block"
app.style.display="none"

}

})

/* TIMER */

let focusTime=1500
let breakTime=300

let time=focusTime
let isFocus=true
let timer
let count=0

countText.innerHTML=count

window.start=function(){

clearInterval(timer)

time=focusTime
isFocus=true

timer=setInterval(update,1000)

}

window.pause=function(){

clearInterval(timer)

}

window.resume=function(){

timer=setInterval(update,1000)

}

function update(){

let min=Math.floor(time/60)
let sec=time%60

timerText.innerHTML=
String(min).padStart(2,"0")+":"+String(sec).padStart(2,"0")

time--

if(time<0){

if(isFocus){

count++
countText.innerHTML=count

saveStudyTime()

isFocus=false
time=breakTime

}else{

isFocus=true
time=focusTime

}

}

}

/* RANDOM */

let activities=[
"อ่านต่ออีก 5 หน้า",
"ทบทวนโน้ต",
"พักสายตา",
"ลุกเดิน",
"ดื่มน้ำ"
]

window.randomActivity=function(){

activity.innerHTML=
activities[Math.floor(Math.random()*activities.length)]

}

/* TRACKER */

window.updateProgress=function(){

let book=bookInput.value
let percent=progressInput.value

bar.style.width=percent+"%"

status.innerHTML="กำลังอ่าน: "+book+" ("+percent+"%)"

}

/* FIRESTORE */

async function saveStudyTime(){

const user=auth.currentUser

const ref=doc(db,"leaderboard",user.uid)

const snap=await getDoc(ref)

if(snap.exists()){

await updateDoc(ref,{
time:snap.data().time+25
})

}else{

await setDoc(ref,{
email:user.email,
time:25
})

}

loadLeaderboard()

}

async function loadLeaderboard(){

const querySnapshot=await getDocs(collection(db,"leaderboard"))

let list=[]

querySnapshot.forEach(doc=>{
list.push(doc.data())
})

list.sort((a,b)=>b.time-a.time)

let html=""

list.forEach((p,i)=>{

html+=(i+1)+". "+p.email+" - "+p.time+" นาที<br>"

})

leaderboard.innerHTML=html

}

</script>

</body>
</html>
