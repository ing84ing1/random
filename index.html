<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Dashboard Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <style>
        :root { --primary: #4facfe; --secondary: #00f2fe; --accent: #ff6b6b; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; }
        .container { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin: 20px; }
        h2, h3 { margin-top: 0; }
        input { width: calc(100% - 20px); padding: 10px; margin: 10px 0; border: none; border-radius: 8px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; background: var(--accent); color: white; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .timer { font-size: 48px; font-weight: bold; margin: 20px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .progress-container { background: rgba(255,255,255,0.3); height: 20px; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .bar { height: 100%; width: 0%; background: #4caf50; transition: width 0.5s ease; }
        #leaderboard { background: white; color: #333; padding: 15px; border-radius: 12px; text-align: left; max-height: 200px; overflow-y: auto; }
        #calendar { background: white; color: black; border-radius: 12px; padding: 10px; margin-top: 20px; font-size: 0.8em; }
        .error { color: #ffeb3b; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h2>🔐 เข้าสู่ระบบ</h2>
        <input id="email" type="email" placeholder="อีเมล">
        <input id="password" type="password" placeholder="รหัสผ่าน">
        <div id="error-msg" class="error"></div>
        <button onclick="handleAuth('login')">เข้าสู่ระบบ</button>
        <button onclick="handleAuth('register')" style="background: transparent; border: 1px solid white;">ลงทะเบียน</button>
    </div>

    <div id="app-section" style="display:none">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span id="user-display">👤 </span>
            <button onclick="logout()" style="padding: 5px 10px; font-size: 12px;">ออกกำลัง</button>
        </div>

        <div class="timer" id="timer-display">25:00</div>
        <button id="start-btn" onclick="startTimer()">เริ่ม</button>
        <button onclick="pauseTimer()">พัก</button>
        <button onclick="resetTimer()" style="background:#666">รีเซ็ต</button>
        <p>Pomodoro วันนี้: <span id="pomo-count">0</span> รอบ</p>

        <hr>
        
        <h3>📖 ติดตามการอ่าน</h3>
        <input id="book-name" placeholder="ชื่อหนังสือที่อ่าน">
        <input id="read-percent" type="number" min="0" max="100" placeholder="ความคืบหน้า (%)">
        <button onclick="updateReadingProgress()">อัปเดต</button>
        <div class="progress-container">
            <div id="progress-bar" class="bar"></div>
        </div>
        <p id="reading-status" style="font-size: 0.9em;"></p>

        <h3>🏆 อันดับนักอ่าน</h3>
        <div id="leaderboard">กำลังโหลด...</div>

        <h3>📅 แผนการเรียน</h3>
        <input id="event-title" placeholder="ชื่อวิชา/งาน">
        <input id="event-date" type="date">
        <button onclick="addNewEvent()">เพิ่มตาราง</button>
        <div id="calendar"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBdGbhUgZ2XcjF1FnXDQQD1LWYGMdyQnQc",
        authDomain: "mumi-chat-f752d.firebaseapp.com",
        projectId: "mumi-chat-f752d",
        storageBucket: "mumi-chat-f752d.firebasestorage.app",
        messagingSenderId: "753963622178",
        appId: "1:753963622178:web:172ee93da98c1a97bb0f7b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let countdown;
    let timeLeft = 1500;
    let calendar;

    // --- Authentication ---
    window.handleAuth = async (type) => {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorDiv = document.getElementById("error-msg");
        try {
            if (type === 'login') await signInWithEmailAndPassword(auth, email, password);
            else await createUserWithEmailAndPassword(auth, email, password);
            errorDiv.innerText = "";
        } catch (err) {
            errorDiv.innerText = "เกิดข้อผิดพลาด: " + err.message;
        }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("app-section").style.display = "block";
            document.getElementById("user-display").innerText = `👤 ${user.email}`;
            initApp();
        } else {
            document.getElementById("login-section").style.display = "block";
            document.getElementById("app-section").style.display = "none";
        }
    });

    // --- Pomodoro Logic ---
    window.startTimer = () => {
        clearInterval(countdown);
        document.getElementById("start-btn").disabled = true;
        countdown = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(countdown);
                handlePomoComplete();
            }
        }, 1000);
    };

    window.pauseTimer = () => {
        clearInterval(countdown);
        document.getElementById("start-btn").disabled = false;
    };

    window.resetTimer = () => {
        pauseTimer();
        timeLeft = 1500;
        updateTimerDisplay();
    };

    function updateTimerDisplay() {
        const min = Math.floor(timeLeft / 60);
        const sec = timeLeft % 60;
        document.getElementById("timer-display").innerText = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    async function handlePomoComplete() {
        const user = auth.currentUser;
        const ref = doc(db, "pomodoro", user.uid);
        const snap = await getDoc(ref);
        let count = snap.exists() ? (snap.data().count || 0) : 0;
        count++;
        await setDoc(ref, { count: count }, { merge: true });
        document.getElementById("pomo-count").innerText = count;
        alert("เก่งมาก! พักสายตาซักครู่นะ");
        resetTimer();
    }

    // --- Reading Progress ---
    window.updateReadingProgress = async () => {
        const book = document.getElementById("book-name").value;
        const percent = parseInt(document.getElementById("read-percent").value);
        if (!book || isNaN(percent)) return;

        const user = auth.currentUser;
        await setDoc(doc(db, "progress", user.uid), {
            email: user.email,
            book: book,
            percent: percent,
            updatedAt: new Date()
        });
    };

    // --- Calendar & Events ---
    async function initCalendar() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            height: 'auto',
            headerToolbar: { left: 'prev', center: 'title', right: 'next' }
        });
        calendar.render();
        loadUserEvents();
    }

    async function loadUserEvents() {
        const user = auth.currentUser;
        const q = query(collection(db, "events"), where("uid", "==", user.uid));
        onSnapshot(q, (snapshot) => {
            calendar.removeAllEvents();
            snapshot.forEach(doc => {
                calendar.addEvent({ title: doc.data().title, start: doc.data().date });
            });
        });
    }

    window.addNewEvent = async () => {
        const title = document.getElementById("event-title").value;
        const date = document.getElementById("event-date").value;
        if (!title || !date) return;

        await addDoc(collection(db, "events"), {
            uid: auth.currentUser.uid,
            title: title,
            date: date
        });
        document.getElementById("event-title").value = "";
    };

    // --- Sync Data ---
    function initApp() {
        initCalendar();
        
        // Load Leaderboard
        onSnapshot(collection(db, "progress"), (snap) => {
            let list = [];
            snap.forEach(doc => list.push(doc.data()));
            list.sort((a, b) => b.percent - a.percent);
            document.getElementById("leaderboard").innerHTML = list.map((p, i) => 
                `<div>${i+1}. <b>${p.email.split('@')[0]}</b>: ${p.book} (${p.percent}%)</div>`
            ).join('<br>');
        });

        // Load Personal Progress
        onSnapshot(doc(db, "progress", auth.currentUser.uid), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById("progress-bar").style.width = data.percent + "%";
                document.getElementById("reading-status").innerText = `กำลังอ่าน: ${data.book}`;
            }
        });

        // Load Pomo Count
        onSnapshot(doc(db, "pomodoro", auth.currentUser.uid), (snap) => {
            if (snap.exists()) document.getElementById("pomo-count").innerText = snap.data().count;
        });
    }
</script>
</body>
</html>
