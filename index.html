<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Study Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

<style>

body{
font-family:system-ui;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
display:flex;
justify-content:center;
padding:20px;
color:white;
}

.container{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:20px;
width:460px;
text-align:center;
}

input,select{
width:90%;
padding:8px;
margin:4px 0;
border:none;
border-radius:6px;
}

button{
padding:8px 14px;
margin:4px;
border:none;
border-radius:8px;
background:#ff6b6b;
color:white;
cursor:pointer;
}

.timer{
font-size:36px;
font-weight:bold;
margin:10px;
}

.progress{
background:#ddd;
height:20px;
border-radius:10px;
overflow:hidden;
}

.bar{
height:20px;
width:0%;
background:#4caf50;
}

#leaderboard{
background:white;
color:black;
padding:10px;
border-radius:10px;
}

#calendar{
background:white;
color:black;
border-radius:10px;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<div id="login">

<h2>🔐 Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button> <button onclick="register()">Register</button>

<p id="error"></p>

</div>

<div id="app" style="display:none">

<h2>📚 Study Dashboard</h2>

<p id="user"></p>

<div class="timer" id="timer">25:00</div>

<button onclick="start()">Start</button> <button onclick="pause()">Pause</button>

<p>Pomodoro วันนี้: <span id="count">0</span></p>

<h3>📚 Reading Tracker</h3>

<input id="book" placeholder="กำลังอ่านเรื่องอะไร">
<input id="progressInput" type="number" min="0" max="100" placeholder="% ที่อ่าน">

<button onclick="updateProgress()">Update</button>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<p id="status"></p>

<h3>🏁 Leaderboard</h3>

<div id="leaderboard"></div>

<h3>📅 ปฏิทินงาน / สอบ</h3>

<input id="eventTitle" placeholder="ชื่อการบ้าน / สอบ">
<input id="eventDate" type="date">

<button onclick="addEvent()">เพิ่ม</button>

<div id="calendar"></div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
signOut,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
collection,
onSnapshot,
addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyBdGbhUgZ2XcjF1FnXDQQD1LWYGMdyQnQc",
authDomain:"mumi-chat-f752d.firebaseapp.com",
projectId:"mumi-chat-f752d",
storageBucket:"mumi-chat-f752d.firebasestorage.app",
messagingSenderId:"753963622178",
appId:"1:753963622178:web:172ee93da98c1a97bb0f7b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const emailInput=document.getElementById("email")
const passwordInput=document.getElementById("password")

const loginDiv=document.getElementById("login")
const appDiv=document.getElementById("app")
const userText=document.getElementById("user")

const timerText=document.getElementById("timer")
const countText=document.getElementById("count")

const bookInput=document.getElementById("book")
const progressInput=document.getElementById("progressInput")
const bar=document.getElementById("bar")
const status=document.getElementById("status")

const leaderboard=document.getElementById("leaderboard")

let timer
let focusTime=1500
let time=focusTime

/* LOGIN */

window.login=function(){

signInWithEmailAndPassword(auth,emailInput.value,passwordInput.value)
.catch(err=>{
document.getElementById("error").innerText=err.message
})

}

window.register=function(){

createUserWithEmailAndPassword(auth,emailInput.value,passwordInput.value)
.catch(err=>{
document.getElementById("error").innerText=err.message
})

}

window.logout=function(){ signOut(auth) }

/* AUTH */

onAuthStateChanged(auth,async (user)=>{

if(user){

loginDiv.style.display="none"
appDiv.style.display="block"

userText.innerHTML="👤 "+user.email

loadLeaderboard()
loadProgress()
loadPomodoro()

}else{

loginDiv.style.display="block"
appDiv.style.display="none"

}

})

/* TIMER */

window.start=function(){

clearInterval(timer)

timer=setInterval(update,1000)

}

window.pause=function(){

clearInterval(timer)

}

async function update(){

let min=Math.floor(time/60)
let sec=time%60

timerText.innerHTML=
String(min).padStart(2,"0")+":"+String(sec).padStart(2,"0")

time--

if(time<0){

time=focusTime

let user=auth.currentUser

let ref=doc(db,"pomodoro",user.uid)

let snap=await getDoc(ref)

let count=0

if(snap.exists()) count=snap.data().count

count++

await setDoc(ref,{count:count})

countText.innerHTML=count

}

}

/* LOAD POMODORO */

async function loadPomodoro(){

const user=auth.currentUser

const ref=doc(db,"pomodoro",user.uid)

const snap=await getDoc(ref)

if(snap.exists()){

countText.innerHTML=snap.data().count

}

}

/* PROGRESS */

window.updateProgress = async function(){

let book=bookInput.value
let percent=Number(progressInput.value)

bar.style.width=percent+"%"

status.innerHTML="กำลังอ่าน: "+book+" ("+percent+"%)"

const user=auth.currentUser

await setDoc(doc(db,"progress",user.uid),{

email:user.email,
book:book,
percent:percent

})

}

/* LOAD PROGRESS */

async function loadProgress(){

const user=auth.currentUser

const ref=doc(db,"progress",user.uid)

const snap=await getDoc(ref)

if(snap.exists()){

let data=snap.data()

bookInput.value=data.book
progressInput.value=data.percent

bar.style.width=data.percent+"%"

status.innerHTML="กำลังอ่าน: "+data.book+" ("+data.percent+"%)"

}

}

/* LEADERBOARD */

function loadLeaderboard(){

onSnapshot(collection(db,"progress"),(snapshot)=>{

let list=[]

snapshot.forEach(doc=>{
list.push(doc.data())
})

list.sort((a,b)=>b.percent-a.percent)

let html=""

list.forEach((p,i)=>{

html+=
(i+1)+". "+p.email+
"<br>"+p.book+
" - "+p.percent+"%<br><br>"

})

leaderboard.innerHTML=html

})

}

/* CALENDAR */

let calendar

document.addEventListener('DOMContentLoaded', function() {

calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

initialView:'dayGridMonth',
height:420

})

calendar.render()

})

window.addEvent=async function(){

let title=document.getElementById("eventTitle").value
let date=document.getElementById("eventDate").value

await addDoc(collection(db,"events"),{
title:title,
date:date
})

calendar.addEvent({
title:title,
start:date
})

}

</script>

</body>
</html>
