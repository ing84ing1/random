<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>สุ่มกิจกรรม</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f0f0f0;
    margin-top:100px;
}

button{
    font-size:22px;
    padding:15px 30px;
    border:none;
    border-radius:12px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:40px;
    font-size:36px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>สุ่มกิจกรรมตอนนี้</h1>

<button onclick="randomActivity()">สุ่ม!</button>

<div id="result"></div>

<script>

let activities = [
"ทำงาน 25 นาที",
"ทำงาน 10 นาที",
"พัก 5 นาที",
"พัก 10 นาที",
"เล่นมือถือ 5 นาที",
"ลุกไปเดิน",
"ดื่มน้ำ",
"ฟังเพลง 1 เพลง",
"ยืดเส้น",
"กลับไปทำงาน!"
];

function randomActivity(){

let random = Math.floor(Math.random()*activities.length);

document.getElementById("result").innerText = activities[random];

}

</script>

</body>
</html>
