<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Study Pomodoro</title>

<style>

body{
font-family:system-ui;
background:linear-gradient(135deg,#4facfe,#00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
background:rgba(255,255,255,0.15);
padding:30px;
border-radius:20px;
text-align:center;
width:340px;
}

.timer{
font-size:48px;
font-weight:bold;
margin:10px 0;
}

.card{
background:white;
color:#333;
padding:15px;
border-radius:10px;
margin:10px 0;
}

input{
width:90%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff6b6b;
color:white;
cursor:pointer;
margin:5px;
}

</style>

</head>

<body>

<div class="container">

<div id="login">

<h2>🔐 Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button> <button onclick="register()">Register</button>

</div>

<div id="app" style="display:none">

<h2>📚 Study Pomodoro</h2>

<p id="user"></p>

<div id="mode">พร้อมเริ่ม</div>

<div class="timer" id="timer">25:00</div>

<div class="card" id="activity">
กดเริ่มเพื่อสุ่มกิจกรรม
</div>

<div>
Pomodoro วันนี้: <span id="count">0</span>
</div>

<button onclick="start()">เริ่ม</button>

<button onclick="logout()">Logout</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey:"AIzaSyBdGbhU6Z2XciF1EnXDQD1LVWGMdyOnQc",
authDomain:"mumi-chat-f752d.firebaseapp.com",
projectId:"mumi-chat-f752d",
storageBucket:"mumi-chat-f752d.appspot.com",
messagingSenderId:"753963622178",
appId:"1:753963622178:web:172ee93da98c1a97bb0f7b"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

window.login=function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

signInWithEmailAndPassword(auth,email,password)

}

window.register=function(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

createUserWithEmailAndPassword(auth,email,password)

}

window.logout=function(){

signOut(auth)

}

onAuthStateChanged(auth,(user)=>{

if(user){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
document.getElementById("user").innerHTML="👤 "+user.email

}else{

document.getElementById("login").style.display="block"
document.getElementById("app").style.display="none"

}

})

let focusTime=1500
let breakTime=300

let time=focusTime
let isFocus=true
let timer

let count=0

document.getElementById("count").innerHTML=count

let studyActivities=[

"📖 อ่านบทเรียน 5 หน้า",
"📖 อ่านสไลด์ 10 หน้า",
"📖 อ่านหัวข้อใหม่",
"📖 ทบทวนบทเรียน",
"🧠 อ่านแล้วสรุป 5 บรรทัด"

]

let breakActivities=[

"😴 หลับตาพัก",
"💧 ดื่มน้ำ",
"🧘 ยืดเส้น",
"🚶 เดินรอบห้อง",
"🌿 มองไกลๆ"

]

function random(list){

return list[Math.floor(Math.random()*list.length)]

}

window.start=function(){

clearInterval(timer)

isFocus=true

time=focusTime

document.getElementById("activity").innerHTML=random(studyActivities)

document.getElementById("mode").innerHTML="📖 โหมดอ่าน"

timer=setInterval(update,1000)

}

function update(){

let min=Math.floor(time/60)
let sec=time%60

document.getElementById("timer").innerHTML=
String(min).padStart(2,"0")+":"+String(sec).padStart(2,"0")

time--

if(time<0){

if(isFocus){

count++
document.getElementById("count").innerHTML=count

isFocus=false
time=breakTime

document.getElementById("mode").innerHTML="😴 โหมดพัก"

document.getElementById("activity").innerHTML=random(breakActivities)

}else{

isFocus=true
time=focusTime

document.getElementById("mode").innerHTML="📖 โหมดอ่าน"

document.getElementById("activity").innerHTML=random(studyActivities)

}

}

}

</script>

</body>
</html>
